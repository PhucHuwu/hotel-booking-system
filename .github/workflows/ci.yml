name: CI

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Detect which apps changed ──────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'

  # ─── API: lint + build ───────────────────────────────────────────────────────
  ci-api:
    name: CI — API (NestJS)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @hotel/api db:generate
        env:
          DATABASE_URL: postgresql://hotel:hotel_secret@localhost:5432/hotel_db

      - name: Build API
        run: pnpm --filter @hotel/api build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 1

  # ─── Web: lint + build ───────────────────────────────────────────────────────
  ci-web:
    name: CI — Web (Next.js)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm --filter @hotel/web build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3000' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-next
          path: apps/web/.next
          retention-days: 1

  # ─── Final gate — all checks passed ─────────────────────────────────────────
  ci-passed:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [ci-api, ci-web]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.ci-api.result }}" == "failure" || "${{ needs.ci-web.result }}" == "failure" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
